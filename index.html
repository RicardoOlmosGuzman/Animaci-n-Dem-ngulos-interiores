<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma de Ángulos Interiores Simultánea</title>
    <style>
        body { 
            margin: 0; 
            background-color: #f4f7f6; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            font-family: 'Segoe UI', sans-serif; 
            overflow-x: hidden;
        }

        /* Contenedor Responsivo: Columna en Celular, Fila en PC */
        .grid-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 1400px;
            padding: 20px;
            box-sizing: border-box;
            justify-content: center;
            align-items: center;
        }

        @media (min-width: 900px) {
            .grid-container { flex-direction: row; }
        }

        /* Cada ventana de animación */
        .anim-wrapper {
            position: relative;
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1; /* Mantiene proporción cuadrada */
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* UI de cada ventana */
        .counter {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            font-weight: bold;
            color: #2c3e50;
            font-family: monospace;
        }

        .banner-360 {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            border: 2px solid #e67e22;
            color: #e67e22;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            opacity: 0;
            transition: opacity 0.3s;
            white-space: nowrap;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.2);
        }

        /* Pantalla Final sobrepuesta */
        #formula-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(244, 247, 246, 0.85); /* Semitransparente para ver los dibujos de fondo */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1s ease-in-out;
            z-index: 10;
        }

        .formula-box {
            background: white;
            padding: 40px;
            border: 4px solid #2c3e50;
            border-radius: 12px;
            font-size: clamp(2rem, 4vw, 3rem); /* Tamaño de texto responsivo */
            font-weight: bold;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            color: #2c3e50;
        }

        .math-text {
            font-family: 'Times New Roman', serif;
            font-style: italic;
            color: #2980b9;
        }
    </style>
</head>
<body>

    <div class="grid-container">
        <!-- Triángulo -->
        <div class="anim-wrapper">
            <div class="counter" id="counter-3">0°</div>
            <canvas id="canvas-3" width="600" height="600"></canvas>
        </div>

        <!-- Cuadrado -->
        <div class="anim-wrapper">
            <div class="counter" id="counter-4">0°</div>
            <canvas id="canvas-4" width="600" height="600"></canvas>
        </div>

        <!-- Pentágono -->
        <div class="anim-wrapper">
            <div class="counter" id="counter-5">0°</div>
            <div class="banner-360" id="banner-5">¡360°: Misma orientación!</div>
            <canvas id="canvas-5" width="600" height="600"></canvas>
        </div>
    </div>

    <!-- Ecuación Final -->
    <div id="formula-overlay">
        <div class="formula-box">
            Triángulo: 180°<br>
            Cuadrado: 360°<br>
            Pentágono: 540°<br><hr style="margin: 20px 0; border: 1px solid #eee;">
            <span class="math-text">&Sigma; &theta;<sub>i</sub> = (n - 2) &times; 180°</span>
        </div>
    </div>

<script>
// Utilidades globales
const sleep = ms => new Promise(res => setTimeout(res, ms));
const easeInOutCubic = t => t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;

// Clase que maneja cada animación independientemente
class PolygonAnim {
    constructor(canvasId, counterId, sides, radius, bannerId = null) {
        this.canvas = document.getElementById(canvasId);
        this.ctx = this.canvas.getContext('2d');
        this.counterEl = document.getElementById(counterId);
        this.bannerEl = bannerId ? document.getElementById(bannerId) : null;
        
        this.sides = sides;
        this.radius = radius;
        this.intAngle = Math.round(180 * (sides - 2) / sides);
        
        // Escala interna adaptada para lienzo de 600x600
        this.PENCIL_LENGTH = 100;
        
        this.state = {
            polygon: [],
            arcs: [],
            pencil: { tipX: 0, tipY: 0, angle: 0, active: false },
            ghostPencil: { tipX: 0, tipY: 0, angle: 0, active: false },
            highlight360: false
        };
    }

    drawPencilBase(tipX, tipY, angleDeg) {
        this.ctx.save();
        this.ctx.translate(tipX, tipY);
        this.ctx.rotate(angleDeg * Math.PI / 180);

        const width = 12;
        const tipL = 22;
        
        // Madera
        this.ctx.fillStyle = "#e5c07b"; 
        this.ctx.beginPath(); this.ctx.moveTo(0, 0); this.ctx.lineTo(-tipL, -width/2); this.ctx.lineTo(-tipL, width/2); this.ctx.closePath(); this.ctx.fill(); this.ctx.stroke();

        // Grafito
        this.ctx.fillStyle = "#333"; 
        this.ctx.beginPath(); this.ctx.moveTo(0, 0); this.ctx.lineTo(-6, -width/6); this.ctx.lineTo(-6, width/6); this.ctx.closePath(); this.ctx.fill();

        // Cuerpo
        this.ctx.fillStyle = "#f1c40f"; 
        this.ctx.fillRect(-this.PENCIL_LENGTH + 18, -width/2, this.PENCIL_LENGTH - tipL - 18, width);
        this.ctx.strokeRect(-this.PENCIL_LENGTH + 18, -width/2, this.PENCIL_LENGTH - tipL - 18, width);

        // Anillo
        this.ctx.fillStyle = "#95a5a6"; 
        this.ctx.fillRect(-this.PENCIL_LENGTH + 8, -width/2, 10, width);
        this.ctx.strokeRect(-this.PENCIL_LENGTH + 8, -width/2, 10, width);

        // Goma
        this.ctx.fillStyle = "#ffb8c6"; 
        this.ctx.fillRect(-this.PENCIL_LENGTH, -width/2, 8, width);
        this.ctx.strokeRect(-this.PENCIL_LENGTH, -width/2, 8, width);

        this.ctx.restore();
    }

    render() {
        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

        // Polígono
        if (this.state.polygon.length > 0) {
            this.ctx.beginPath();
            this.ctx.moveTo(this.state.polygon[0].x, this.state.polygon[0].y);
            for (let i = 1; i < this.state.polygon.length; i++) {
                this.ctx.lineTo(this.state.polygon[i].x, this.state.polygon[i].y);
            }
            this.ctx.closePath();
            this.ctx.strokeStyle = "#34495e"; this.ctx.lineWidth = 4; this.ctx.stroke();
        }

        // Arcos
        this.state.arcs.forEach(arc => {
            this.ctx.beginPath();
            this.ctx.arc(arc.x, arc.y, 35, arc.start, arc.end, true); 
            this.ctx.strokeStyle = "#3498db"; this.ctx.lineWidth = 3; this.ctx.stroke();
            
            this.ctx.fillStyle = "#2980b9"; this.ctx.font = "bold 18px Arial";
            let mid = (arc.start + arc.end) / 2;
            if (Math.abs(arc.start - arc.end) > Math.PI) mid += Math.PI;
            this.ctx.fillText(arc.text, arc.x + Math.cos(mid)*50 - 15, arc.y + Math.sin(mid)*50 + 6);
        });

        // Lápiz Fantasma (Fijo en el inicio)
        if(this.state.ghostPencil.active) {
            this.ctx.globalAlpha = 0.3;
            this.drawPencilBase(this.state.ghostPencil.tipX, this.state.ghostPencil.tipY, this.state.ghostPencil.angle);
            this.ctx.globalAlpha = 1.0;
        }

        // Lápiz Principal
        if(this.state.pencil.active) {
            if(this.state.highlight360) {
                this.ctx.save();
                this.ctx.translate(this.state.pencil.tipX, this.state.pencil.tipY);
                this.ctx.rotate(this.state.pencil.angle * Math.PI / 180);
                this.ctx.shadowColor = "#f39c12"; this.ctx.shadowBlur = 20;
                this.ctx.strokeStyle = "rgba(243, 156, 18, 0.8)"; this.ctx.lineWidth = 6;
                this.ctx.strokeRect(-this.PENCIL_LENGTH - 4, -10, this.PENCIL_LENGTH + 8, 20);
                this.ctx.restore();
            }
            this.drawPencilBase(this.state.pencil.tipX, this.state.pencil.tipY, this.state.pencil.angle);
        }
    }

    getPolygonVertices() {
        const cx = this.canvas.width / 2;
        const bottomY = this.canvas.height - 120; // Línea base igual para todos
        const cy = bottomY - this.radius * Math.cos(Math.PI / this.sides);
        let vertices = [];
        for (let i = 0; i < this.sides; i++) {
            let angle = (Math.PI / 2 + Math.PI / this.sides) - i * (2 * Math.PI / this.sides);
            vertices.push({ x: cx + this.radius * Math.cos(angle), y: cy + this.radius * Math.sin(angle) });
        }
        return vertices;
    }

    updateCounter(angle) {
        this.counterEl.innerText = Math.round(angle) + "°";
    }

    animateValue(duration, callback) {
        return new Promise(resolve => {
            let startTime = null;
            const step = (timestamp) => {
                if (!startTime) startTime = timestamp;
                let p = Math.min((timestamp - startTime) / duration, 1);
                callback(easeInOutCubic(p));
                if (p < 1) requestAnimationFrame(step);
                else resolve();
            };
            requestAnimationFrame(step);
        });
    }

    async translateTip(targetX, targetY, duration) {
        let startX = this.state.pencil.tipX; let startY = this.state.pencil.tipY;
        await this.animateValue(duration, p => {
            this.state.pencil.tipX = startX + (targetX - startX) * p;
            this.state.pencil.tipY = startY + (targetY - startY) * p;
        });
    }

    async rotatePivotTip(startAng, endAng, duration) {
        await this.animateValue(duration, p => {
            this.state.pencil.angle = startAng + (endAng - startAng) * p;
            this.updateCounter(this.state.pencil.angle);
        });
    }

    async rotatePivotEraser(startAng, endAng, duration) {
        let radStart = startAng * Math.PI / 180;
        let eraserX = this.state.pencil.tipX - this.PENCIL_LENGTH * Math.cos(radStart);
        let eraserY = this.state.pencil.tipY - this.PENCIL_LENGTH * Math.sin(radStart);
        await this.animateValue(duration, p => {
            let curAng = startAng + (endAng - startAng) * p;
            this.state.pencil.angle = curAng;
            let radCur = curAng * Math.PI / 180;
            this.state.pencil.tipX = eraserX + this.PENCIL_LENGTH * Math.cos(radCur);
            this.state.pencil.tipY = eraserY + this.PENCIL_LENGTH * Math.sin(radCur);
            this.updateCounter(curAng);
        });
    }

    async performRotation(startAng, endAng, leadingPart) {
        const rotDuration = 700; // Rotación un poco más rápida

        if (startAng < 360 && endAng > 360 && this.bannerEl) {
            let p = (360 - startAng) / (endAng - startAng);
            
            // 1. Rotar hasta 360 exactos
            if(leadingPart === "tip") await this.rotatePivotTip(startAng, 360, rotDuration * p);
            else await this.rotatePivotEraser(startAng, 360, rotDuration * p);
            
            // 2. Efecto visual y Pausa de 1.5s
            this.state.highlight360 = true;
            this.bannerEl.style.opacity = 1;
            await sleep(1500); 
            
            this.state.highlight360 = false;
            this.bannerEl.style.opacity = 0;
            
            // 3. Continuar el resto de la rotación
            if(leadingPart === "tip") await this.rotatePivotTip(360, endAng, rotDuration * (1 - p));
            else await this.rotatePivotEraser(360, endAng, rotDuration * (1 - p));

        } else {
            if(leadingPart === "tip") await this.rotatePivotTip(startAng, endAng, rotDuration);
            else await this.rotatePivotEraser(startAng, endAng, rotDuration);
        }
    }

    async runSequence() {
        this.state.polygon = this.getPolygonVertices();
        this.state.arcs = [];
        let vList = this.state.polygon;
        let n = this.sides;
        
        let midStartX = (vList[0].x + vList[1].x) / 2;
        let midStartY = (vList[0].y + vList[1].y) / 2;
        
        // Centrado inicial
        this.state.pencil.tipX = midStartX + this.PENCIL_LENGTH / 2;
        this.state.pencil.tipY = midStartY;
        this.state.pencil.angle = 0; 
        this.state.pencil.active = true;
        this.updateCounter(0);

        // Fantasma
        this.state.ghostPencil.tipX = this.state.pencil.tipX;
        this.state.ghostPencil.tipY = this.state.pencil.tipY;
        this.state.ghostPencil.angle = 0;
        this.state.ghostPencil.active = true;

        let leadingPart = "tip"; 
        await sleep(800);

        // Velocidad aumentada de traslación
        const transSpeed = 500; 

        await this.translateTip(vList[1].x, vList[1].y, transSpeed);

        for (let i = 1; i <= n; i++) {
            let currentV = vList[i % n];
            let prevV = vList[(i - 1) % n];
            let nextV = vList[(i + 1) % n];

            let aPrev = Math.atan2(prevV.y - currentV.y, prevV.x - currentV.x);
            let aNext = Math.atan2(nextV.y - currentV.y, nextV.x - currentV.x);
            this.state.arcs.push({ x: currentV.x, y: currentV.y, start: aNext, end: aPrev, text: this.intAngle + "°" });
            
            await sleep(150);

            let curAng = this.state.pencil.angle;
            await this.performRotation(curAng, curAng + this.intAngle, leadingPart);
            leadingPart = (leadingPart === "tip") ? "eraser" : "tip"; 

            await sleep(150);

            let targetV = (i === n) ? { x: midStartX, y: midStartY } : nextV;

            if (leadingPart === "tip") {
                if(i === n) {
                    let finalTipX = midStartX + (this.PENCIL_LENGTH/2) * Math.cos(this.state.pencil.angle * Math.PI/180);
                    let finalTipY = midStartY + (this.PENCIL_LENGTH/2) * Math.sin(this.state.pencil.angle * Math.PI/180);
                    await this.translateTip(finalTipX, finalTipY, transSpeed);
                } else {
                    await this.translateTip(targetV.x, targetV.y, transSpeed);
                }
            } else {
                if(i === n) {
                    let finalTipX = midStartX + (this.PENCIL_LENGTH/2) * Math.cos(this.state.pencil.angle * Math.PI/180);
                    let finalTipY = midStartY + (this.PENCIL_LENGTH/2) * Math.sin(this.state.pencil.angle * Math.PI/180);
                    await this.translateTip(finalTipX, finalTipY, transSpeed);
                } else {
                    let rad = this.state.pencil.angle * Math.PI / 180;
                    let targetTipX = targetV.x + this.PENCIL_LENGTH * Math.cos(rad);
                    let targetTipY = targetV.y + this.PENCIL_LENGTH * Math.sin(rad);
                    await this.translateTip(targetTipX, targetTipY, transSpeed);
                }
            }
        }

        // Final de la figura
        await sleep(1000); 
        this.state.ghostPencil.active = false; 
        
        // No borramos la figura ni los arcos para que queden de fondo
    }

    clearState() {
        this.state.polygon = [];
        this.state.arcs = [];
        this.state.pencil.active = false;
        this.state.ghostPencil.active = false;
        this.updateCounter(0);
    }
}

// Inicialización de las 3 animaciones
const anim3 = new PolygonAnim('canvas-3', 'counter-3', 3, 140);
const anim4 = new PolygonAnim('canvas-4', 'counter-4', 4, 160);
const anim5 = new PolygonAnim('canvas-5', 'counter-5', 5, 180, 'banner-5');

// Bucle de renderizado global que actualiza todos los lienzos a 60fps
function globalRenderLoop() {
    anim3.render();
    anim4.render();
    anim5.render();
    requestAnimationFrame(globalRenderLoop);
}

// Controlador maestro que sincroniza y repite el proceso
async function masterSequence() {
    const overlay = document.getElementById('formula-overlay');

    while(true) {
        overlay.style.opacity = 0;
        
        // Limpiamos los rastros de la ronda anterior
        anim3.clearState(); anim4.clearState(); anim5.clearState();
        
        await sleep(500);

        // Arrancamos las tres promesas en paralelo
        let p3 = anim3.runSequence();
        let p4 = anim4.runSequence();
        let p5 = anim5.runSequence();
        
        // Esperamos a que la más larga (Pentágono) termine
        await Promise.all([p3, p4, p5]);
        
        // Pequeña pausa antes de mostrar la fórmula
        await sleep(500);
        
        // Hacemos aparecer la fórmula sin borrar los dibujos de fondo
        overlay.style.opacity = 1;
        
        // Mostramos el resumen por 6 segundos
        await sleep(6000);
    }
}

// Arrancar
requestAnimationFrame(globalRenderLoop);
masterSequence();

</script>
</body>
</html>
